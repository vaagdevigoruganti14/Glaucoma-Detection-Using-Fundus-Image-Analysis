<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glaucoma Detector | 3D UI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1f0b4d 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .graphics-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .graphics-layer::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#6c757d 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.1;
            animation: moveDots 60s linear infinite;
        }

        @keyframes moveDots {
            from {
                background-position: 0 0;
            }
            to {
                background-position: 100% 100%;
            }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 650px;
            padding: 40px;

            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);

            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);

            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);

            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: scale(1.02);
        }

        .text-primary {
            color: #00bcd4 !important;
            text-shadow: 0 0 10px rgba(0, 188, 212, 0.5);
        }

        .result-box {
            padding: 25px;
            margin-top: 25px;
            border-radius: 12px;
            text-align: center;
            color: white;
            font-weight: bold;
        }

        .glaucoma {
            background: rgba(189, 8, 8, 0.7);
            border: 2px solid #ff4d4d;
            box-shadow: 0 0 15px #ff4d4d;
        }

        .normal {
            background: rgba(0, 150, 0, 0.7);
            border: 2px solid #66ff66;
            box-shadow: 0 0 15px #66ff66;
        }

        /* Preloader */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            transition: opacity 0.5s ease;
        }

        .progress-bar-container {
            width: 80%;
            max-width: 400px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 20px;
        }

        #loading-bar {
            height: 25px;
            width: 0%;
            background: #00bcd4;
        }

        #loading-text {
            color: #00bcd4;
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- Preloader -->
    <div id="preloader">
        <div id="loading-text">Loading... 0%</div>

        <div class="progress-bar-container">
            <div id="loading-bar"></div>
        </div>
    </div>

    <div class="graphics-layer"></div>

    <div class="container">

        <h1 class="text-center mb-4 text-primary">
            👁️ Glaucoma Detector
        </h1>

        <p class="text-center text-light mb-4">
            Upload a clear Eye Fundus Image to check for signs of glaucoma.
        </p>

        <form method="POST" enctype="multipart/form-data">

            <div class="input-group">

                <input
                    type="file"
                    name="file"
                    class="form-control"
                    required
                >

                <button
                    class="btn btn-primary"
                    type="submit"
                    style="background:#00bcd4;border-color:#00bcd4;"
                >
                    Upload & Detect
                </button>

            </div>

        </form>

        {% if result %}

        <hr style="border-top:1px solid rgba(255,255,255,0.3);">

        <div class="result-box {% if 'Glaucoma' in result %}glaucoma{% else %}normal{% endif %}">

            <h3>Detection Result</h3>

            <p class="fs-3 mb-0">
                {{ result }}
            </p>

        </div>

        {% endif %}

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

    <!-- Preloader Script -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const preloader = document.getElementById("preloader");
            const loadingBar = document.getElementById("loading-bar");
            const loadingText = document.getElementById("loading-text");

            let width = 0;

            const interval = setInterval(() => {

                if (width >= 100) {

                    clearInterval(interval);

                    preloader.style.opacity = "0";

                    setTimeout(() => {
                        preloader.style.display = "none";
                    }, 500);

                } else {

                    width++;

                    loadingBar.style.width = width + "%";
                    loadingText.textContent = `Loading... ${width}%`;
                }

            }, 20);

        });
    </script>

</body>
</html>
